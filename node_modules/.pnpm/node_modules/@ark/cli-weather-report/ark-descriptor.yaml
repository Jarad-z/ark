apiVersion: ark/v1
kind: CliDescriptor

functional:
  id: "@ark/cli-weather-report"
  version: "0.1.0"
  displayName: "Weather Daily Report"
  description: |
    Composed CLI that fetches current weather for a city and generates a
    human-readable daily report in Chinese using AI. Supports --auto mode
    (AI picks city and style) and --manual mode (human reviews data before generation).
  entrypoint: "dist/index.js"
  modes: [auto, manual]

  inputs: []

  outputs:
    - id: city
      type: string
      description: "City the report was generated for."
    - id: report
      type: string
      description: "Generated report text."
    - id: savedPath
      type: string
      description: "Path to saved markdown file."

  commands:
    - name: run
      description: "Fetch weather and generate a daily report."
      wiringRef: "ark-wiring.yaml"
      options:
        - flag: "--city"
          type: string
          required: false
          description: "City name. AI picks if omitted in --auto mode."
        - flag: "--style"
          type: string
          required: false
          description: "Report style: casual, professional, poetic."
        - flag: "--output-dir"
          type: string
          required: false
          description: "Output directory for the markdown file."
        - flag: "--auto"
          type: boolean
          required: false
          description: "Enable auto mode: AI decides city and style."
        - flag: "--dry-run"
          type: boolean
          required: false
          description: "Fetch and preview without generating AI report."

  types: {}
  env:
    - name: ANTHROPIC_API_KEY
      required: true
      description: "Required for AI report generation step."

lineage:
  kind: composed
  createdAt: "2025-03-27T00:00:00+00:00"
  authors:
    - handle: "you"
  parents:
    - id: "@ark/cli-weather"
      version: "0.1.0"
      descriptorHash: "sha256:hand-written-validation"
    - id: "@ark/cli-report"
      version: "0.1.0"
      descriptorHash: "sha256:hand-written-validation"
  aiPrompt: |
    (hand-written for phase 5 validation — in production this would be
    generated by ark compose --request compose-request.yaml)
  aiProposal: |
    Sequential pipeline: fetch weather → optional human review → generate AI report → log result.
    The fetch step output (WeatherData object) is bound to ctx.bindings.weatherData and passed
    directly as the weatherData input to the generate step. In manual mode a human-review
    builtin step intercepts between fetch and generate.
  approvedWiringRef: "ark-wiring.yaml"
  humanEdits: "Added jitter to retry policy and poetic style option."
  usedAsParentIn: []
