apiVersion: ark/v1
kind: CliDescriptor

functional:
  id: "@ark/cli-report"
  version: "0.1.0"
  displayName: "Weather Report CLI"
  description: |
    Receives structured weather data and uses AI to generate a human-readable
    daily weather report in Chinese. Saves the report as a markdown file.
  entrypoint: "dist/index.js"
  modes: [manual, auto]

  inputs:
    - id: weatherData
      type: WeatherData
      required: true
      description: "Structured weather data object from cli-weather."
    - id: style
      type: string
      required: false
      description: "Report writing style. E.g. 'casual', 'professional', 'humorous'."
    - id: outputDir
      type: string
      required: false
      description: "Directory to save the report markdown file. Defaults to ./reports."

  outputs:
    - id: city
      type: string
      description: "City name the report is about."
    - id: report
      type: string
      description: "The generated weather report text."
    - id: savedPath
      type: string
      description: "Absolute path to the saved markdown file."
    - id: generatedAt
      type: string
      description: "ISO 8601 timestamp of generation."

  commands:
    - name: generate
      description: "Generate a weather report from structured weather data."
      options:
        - flag: "--style"
          type: string
          required: false
          description: "Report style (casual, professional, humorous)."
        - flag: "--output-dir"
          type: string
          required: false
          description: "Output directory for the markdown file."

  types:
    WeatherData:
      city: string
      tempC: number
      feelsLikeC: number
      humidity: number
      windKmph: number
      description: string
      uvIndex: number
      visibility: number
      fetchedAt: string

  env:
    - name: ANTHROPIC_API_KEY
      required: true
      description: "Anthropic API key for AI content generation."

lineage:
  kind: leaf
  createdAt: "2025-01-01T00:00:00+00:00"
  history: []
